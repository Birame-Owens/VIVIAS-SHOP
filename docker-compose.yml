services:
  db:
    image: postgres:15-alpine
    container_name: vivias_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-VIVIAS}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-VIVIAS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vivias_network

  redis:
    image: redis:7-alpine
    container_name: vivias_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vivias_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivias_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8001}
      TELESCOPE_ENABLED: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-VIVIAS}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CACHE_STORE: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: database
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
      SANCTUM_STATEFUL_DOMAINS: localhost:8001,127.0.0.1:8001,localhost:5173,127.0.0.1:5173
    ports:
      - "${APP_PORT:-8001}:8000"
    volumes:
      - ./app:/app/app
      - ./bootstrap:/app/bootstrap
      - ./config:/app/config
      - ./database:/app/database
      - ./resources:/app/resources
      - ./routes:/app/routes
      - ./storage:/app/storage
      - ./public:/app/public
    networks:
      - vivias_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vivias_frontend
    depends_on:
      - backend
    environment:
      APP_URL: http://backend:8000
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8001/api}
      VITE_HMR_HOST: localhost
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./resources:/app/resources
      - ./public:/app/public
      - ./vite.config.js:/app/vite.config.js
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
    networks:
      - vivias_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivias_queue_worker
    depends_on:
      backend:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-VIVIAS}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CACHE_STORE: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: database
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
      TELESCOPE_ENABLED: "false"
    volumes:
      - ./app:/app/app
      - ./bootstrap:/app/bootstrap
      - ./config:/app/config
      - ./database:/app/database
      - ./resources:/app/resources
      - ./routes:/app/routes
      - ./storage:/app/storage
    command: sh -c "sleep 15 && php artisan config:clear && php artisan queue:work database --sleep=3 --tries=3"
    networks:
      - vivias_network

volumes:
  postgres_data:
  redis_data:

networks:
  vivias_network:
    driver: bridge
