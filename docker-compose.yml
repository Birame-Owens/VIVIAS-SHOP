version: '3.8'

# ==========================================
# VIVIAS-SHOP Docker Compose
# ==========================================

services:
  # ===== Database: PostgreSQL =====
  db:
    image: postgres:15-alpine
    container_name: vivias_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-VIVIAS}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vivias_network

  # ===== Backend: Laravel 12 API =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivias_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-VIVIAS SHOP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-VIVIAS}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-north-1}
      AWS_BUCKET: ${AWS_BUCKET:-ecommerce-images-owens}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./routes:/app/routes
      - ./resources:/app/resources
      - ./storage:/app/storage
      - ./database:/app/database
    networks:
      - vivias_network
    command: >
      sh -c "php artisan migrate --force &&
             php artisan queue:work database --sleep=3 --tries=3 &
             php artisan serve --host=0.0.0.0 --port=8000"

  # ===== Frontend: React 19 =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vivias_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${FRONTEND_API_URL:-http://localhost:8000/api}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - vivias_network
    stdin_open: true
    tty: true

  # ===== Redis Cache (Optional but recommended) =====
  redis:
    image: redis:7-alpine
    container_name: vivias_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - vivias_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Queue Worker (Optional, separate instance) =====
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivias_queue_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-VIVIAS SHOP}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-VIVIAS}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
    networks:
      - vivias_network
    command: php artisan queue:work database --sleep=3 --tries=3 --daemon

# ===== Volumes =====
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===== Networks =====
networks:
  vivias_network:
    driver: bridge
